<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STL 輪郭切断スライサー「CutStack」v2.0</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="mode-select-screen">
    <h1>STL 輪郭切断スライサー<br><span style="font-size:1.2em;letter-spacing:0.05em">「CutStack」</span><span style="font-size:0.7em;font-weight:400;margin-left:8px">v2.0</span></h1>
    <p>ご利用のモードを選択してください</p>
    <div class="mode-cards">

      <a href="simple.html" class="mode-card card-simple">
        <div class="card-icon">🟦</div>
        <h2>シンプル版</h2>
        <p>はじめての方・手軽に使いたい方向け</p>
        <ul>
          <li>板厚・板幅・板高さのみ設定</li>
          <li>ボタン1つでスライス生成</li>
          <li>配置プレビュー＋3D完成図</li>
          <li>全板SVG / PDF保存</li>
          <li>診断パネルなし</li>
        </ul>
        <div class="card-btn">シンプル版を使う</div>
      </a>

      <a href="full.html" class="mode-card card-full">
        <div class="card-icon">🟧</div>
        <h2>フル機能版</h2>
        <p>詳細設定・診断機能が必要な方向け</p>
        <ul>
          <li>接続許容値・修復許容値など全設定</li>
          <li>スライス結果の詳細診断</li>
          <li>修復前後比較・ペア候補表示</li>
          <li>板ごとのナビゲーション</li>
          <li>配置プレビュー＋3D完成図</li>
        </ul>
        <div class="card-btn">フル機能版を使う</div>
      </a>

    </div>
  </div>
</body>
</html>
